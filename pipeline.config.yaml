name: default-pipeline
description: "Standard flow: PM -> Architect -> Developer -> Tester"

stages:
  - id: ideation
    agent: project_manager
    description: "Break down the goal into tasks and prioritize"
    autoTransition: true

  - id: architecture
    agent: architect
    description: "Design technical approach and create spec"
    autoTransition: false
    approvalMessage: "Review the architecture spec before proceeding to implementation?"

  - id: implementation
    agent: developer
    description: "Implement code based on architect spec"
    autoTransition: true

  - id: testing
    agent: tester
    description: "Write and run tests, validate implementation"
    autoTransition: true

transitions:
  - from: ideation
    to: architecture
  - from: architecture
    to: implementation
  - from: implementation
    to: testing
  - from: testing
    to: done
